    <script>
        function toggleMobileMenu() {
            const menu = document.getElementById('mobileMenu');
            menu.classList.toggle('hidden');
        }

        // Tailwind script already loaded via CDN
        console.log('%cGlass Purple Theme loaded successfully ✨', 'color:#c026d3; font-family:monospace');

        const searchInput = document.getElementById('inventorySearch');
        const inventoryCards = Array.from(document.querySelectorAll('.inventory-card'));
        const noResults = document.getElementById('noResults');

        function filterInventory() {
            const query = searchInput.value.trim().toLowerCase();
            let hasMatch = false;

            inventoryCards.forEach(card => {
                const searchableText = `${card.dataset.search || ''} ${card.textContent}`.toLowerCase();
                const matches = searchableText.includes(query);
                card.classList.toggle('hidden', !matches);
                if (matches) {
                    hasMatch = true;
                }
            });

            noResults.classList.toggle('hidden', hasMatch || query === '');
        }

        if (searchInput) {
            searchInput.addEventListener('input', filterInventory);
            filterInventory();
        }
        
        // Simple scroll effect for navbar
        window.addEventListener('scroll', () => {
            const nav = document.querySelector('nav');
            if (window.scrollY > 50) {
                nav.classList.add('shadow-2xl');
            } else {
                nav.classList.remove('shadow-2xl');
            }
        });
    </script>
